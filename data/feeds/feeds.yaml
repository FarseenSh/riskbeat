# RiskBeat feed registry — the single source of truth for every feed column.
#
# Every entry MUST carry a `conflict_of_interest` field (empty string is a
# valid value; an ABSENT field fails CI) — this makes neutrality
# machine-auditable. See CHARTER.md §6.
#
# `automation_tier`: full | partial | manual-only
# `status`:          active | partial | manual | deprecated
# `inline_label`:    charter §4 inline exception — only short self-explanatory
#                    ordinal vocabularies may render inside the matrix.
# This file generates the typed FeedKey union (scripts/codegen-feedkey.ts);
# the registry and the type system cannot drift.

feeds:
  # ————————————————— Tier A — live, automated nightly (6) —————————————————
  - key: defiscan
    display_name: "DeFiScan"
    url: "https://defiscan.info"
    source_url: "https://github.com/deficollective/defiscan"
    license: "MIT"
    access_method: github_raw
    machine_readable: true
    api_key_required: false
    automation_tier: full
    status: active
    provenance_tag: feed
    methodology: "Decentralization-maturity reviews: a public stage framework plus per-dimension risk levels, maintained in the open on GitHub."
    rating_vocabulary: "Stage 0 / 1 / 2 + per-dimension L/M/H (Chain, Upgradeability, Autonomy, Exit Window, Accessibility)"
    rating_kind: stage-ladder
    inline_label: true
    scope_note: "Reviews protocol deployments per chain; RiskBeat consumes the Ethereum-mainnet reviews. Stages measure decentralization maturity, not safety."
    conflict_of_interest: "Built by the DeFi Collective. Disclosed proximity in CONFLICTS.md: RiskBeat consumes only its public MIT-licensed data and has no relationship with the publisher."

  - key: defipunkd
    display_name: "DeFiPunk'd"
    url: "https://defipunkd.com"
    source_url: "https://github.com/guil-lambert/defipunkd"
    license: "MIT"
    access_method: github_raw
    machine_readable: true
    api_key_required: false
    automation_tier: full
    status: active
    provenance_tag: feed
    methodology: "Multi-model LLM consensus assessments per slice, merged from independent model submissions; an independent open-source project."
    rating_vocabulary: "Per-slice green / orange / red / unknown + weak/strong consensus (slices: control, ability-to-exit, autonomy, open-access, verifiability)"
    rating_kind: consensus-color
    inline_label: false
    scope_note: "Assessment units are its own protocol slugs (often versioned). RiskBeat shows each published slice verbatim and does not derive a publication tier from slice counts."
    conflict_of_interest: ""

  - key: philidor
    display_name: "Philidor"
    url: "https://philidor.io"
    source_url: "https://api.philidor.io/v1"
    license: "Public API"
    access_method: rest_api
    machine_readable: true
    api_key_required: false
    automation_tier: full
    status: active
    provenance_tag: feed
    methodology: "Deterministic vault risk scoring (framework v4.x): asset, platform and governance vectors recomputed continuously per vault."
    rating_vocabulary: "0–10 score + Prime / Core / Edge tier per vault"
    rating_kind: numeric-tier
    inline_label: false
    scope_note: "Vault-scoped: scores individual vaults/markets, not whole protocols. On protocol rows whose vaults it wraps, coverage renders as partial with this note."
    conflict_of_interest: ""

  - key: pharos
    display_name: "Pharos"
    url: "https://pharos.watch"
    source_url: "https://api.pharos.watch"
    license: "Public API (free key)"
    access_method: rest_api
    machine_readable: true
    api_key_required: true
    automation_tier: full
    status: active
    provenance_tag: feed
    methodology: "Real-time stablecoin safety monitoring: dimensional report cards plus a depeg early-warning system (DEWS)."
    rating_vocabulary: "Safety grade A+–F / NR + DEWS band Calm / Watch / Alert / Warning / Danger"
    rating_kind: letter-grade
    inline_label: false
    scope_note: "Stablecoin-scoped: applies only to protocols with an associated stablecoin (e.g. GHO, USDS/DAI, crvUSD, LUSD/BOLD). All other cells render not-applicable, never as a coverage gap."
    conflict_of_interest: "Built by a DeFi Collective board member. Disclosed proximity in CONFLICTS.md: RiskBeat consumes only its public API data."

  - key: defillama-hacks
    display_name: "DefiLlama Hacks"
    url: "https://defillama.com/hacks"
    source_url: "https://api.llama.fi/hacks"
    license: "Open data"
    access_method: rest_api
    machine_readable: true
    api_key_required: false
    automation_tier: full
    status: active
    provenance_tag: feed
    methodology: "Community-maintained registry of DeFi exploit events with date, amount and technique."
    rating_vocabulary: "Incident events: date + USD amount + technique (not a rating)"
    rating_kind: incident-history
    inline_label: false
    scope_note: "Incident history, not an assessment. A protocol with zero events renders as 'no incidents on record', which is itself a datum — never as a judgment."
    conflict_of_interest: ""

  - key: defisphere
    display_name: "DeFi Sphere"
    url: "https://sphere.blockanalitica.com"
    source_url: "https://sphere.data.blockanalitica.com/markets/"
    license: "Public API"
    access_method: rest_api
    machine_readable: true
    api_key_required: false
    automation_tier: full
    status: active
    provenance_tag: feed
    methodology: "Quantitative lending-market risk analytics by Block Analitica: per-market collateral and liquidity risk scores."
    rating_vocabulary: "Per-market collateral risk score + liquidity risk score (0–100 floats)"
    rating_kind: market-scores
    inline_label: false
    scope_note: "Lending-market-scoped: covers individual lending markets (Aave, Spark, Morpho, Compound, …). Non-lending protocols render not-applicable; lending protocols absent from its market set are honest not-yet-covered."
    conflict_of_interest: "Built by Block Analitica, which provides ongoing risk services to Spark, a protocol listed in this registry."

